version: '3.8'

services:
  # Optional: Qdrant vector database (alternative to ChromaDB)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: powerbi-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    profiles:
      - qdrant
    restart: unless-stopped

  # Optional: Redis for caching (alternative to SQLite)
  redis:
    image: redis:7-alpine
    container_name: powerbi-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - redis
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  qdrant_storage:
  redis_data: